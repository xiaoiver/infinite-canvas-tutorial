name: publish

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Publish to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: pnpm/action-setup@v4
        with:
          version: 9  

      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: 20.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm -r --filter '!@infinite-canvas-tutorial/app' --filter '!@infinite-canvas-tutorial/site' run build

      - name: Build site
        env:
          # VitePress bundles many demo deps (vello wasm, lottie, etc.) and exceeds the default ~4GB heap.
          NODE_OPTIONS: --max-old-space-size=6144
          # 配置了 ADSENSE_CLIENT 时默认启用；也可通过 vars/secrets.ADSENSE_ENABLED 显式控制
          ADSENSE_ENABLED: ${{ secrets.ADSENSE_CLIENT != '' && 'true' || vars.ADSENSE_ENABLED || secrets.ADSENSE_ENABLED }}
          ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
        run: pnpm --filter '@infinite-canvas-tutorial/site' run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 4abdc9b6ff77e69917753afff2a4ad14
          projectName: infinite-canvas-tutorial
          directory: packages/site/docs/.vitepress/dist
          # Optional: Switch what branch you are publishing to.
          # By default this will be the branch which triggered this workflow
          branch: master
          # Optional: Change the working directory
          # workingDirectory: my-site
          # Optional: Change the Wrangler version, allows you to point to a specific version or a tag such as `beta`
          wranglerVersion: '3'

      # - name: Algolia crawler creation and crawl
